<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goggles - 결제하기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Toss Payments SDK -->
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<div class="payment-wrapper">
    <div class="payment-card">
        <header class="payment-header">
            <h2>주문 결제</h2>
            <p class="subtitle">선택하신 상품 정보를 확인해주세요.</p>
        </header>

        <section class="order-info">
            <div class="info-row">
                <span class="label">주문 상품</span>
                <span class="value" th:text="${orderName}">상품명</span>
            </div>
            <div class="info-row">
                <span class="label">결제 금액</span>
                <span class="value price" th:text="${#numbers.formatInteger(amount, 3, 'COMMA') + '원'}">0원</span>
            </div>
        </section>

        <!-- 결제 UI가 렌더링될 영역 -->
        <div id="payment-method"></div>
        <div id="agreement"></div>

        <button class="btn-pay" id="payment-button">
            <span th:text="${#numbers.formatInteger(amount, 3, 'COMMA') + '원'}">0원</span> 결제하기
        </button>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const orderId = [[${orderId}]];
    const amount = [[${amount}]];
    const orderName = [[${orderName}]];
    /*]]>*/
</script>
<script th:src="@{/js/toss.js}"></script>
</body>
</html>
