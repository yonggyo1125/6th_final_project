server:
  port: 13100

spring:
  application:
    name: config-server
  profiles:
    active: git

  cloud:
    config:
      server:
        git:
          uri: https://github.com/89-49/configs
          default-label: main
          search-paths:
            - configs/common
            - configs/{application}
          clone-on-start: true

eureka:
  instance:
    prefer-ip-address: false
    hostname: ${HOSTNAME:localhost}

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:13101/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

    prometheus:
      enabled: true
    metrics:
      enabled: true

  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1
    zipkin:
      tracing:
        endpoint: "${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}"