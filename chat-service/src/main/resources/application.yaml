spring:
  application:
    name: chat-service

  config:
    import:
      - "optional:configserver: "
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
eureka:
  instance:
    prefer-ip-address: false
    hostname: ${HOSTNAME:localhost}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_SERVER_URL1:localhost}:13101/eureka/