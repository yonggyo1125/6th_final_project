server:
  port: 10006

spring:
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL:localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    open-in-view: false
    generate-ddl: true

# 로그 설정
logging:
  level:
    org.hibernate.type: trace
    org.hibernate.orm.jdbc.bind: trace


# 파일 설정
file:
  storage:
    type: local

  local:
    base:
      path: ${FILE_BASE_PATH:./storage/files}
      url: ${FILE_BASE_URL:/upload/}

toss:
  secret-key: ${TOSS_API_KEY}
