server:
  port: 10003

spring:
  cloud:
    gcp:
      storage:
        enabled: true
        bucket: ${GCS_BUCKET_NAME}
      credentials:
        location: ${GCP_CREDENTIAL_LOCATION}
      project-id: ${GCP_PROJECT_ID}
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL:localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    open-in-view: false
    generate-ddl: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 로그 설정
logging:
  level:
    org.hibernate.type: trace
    org.hibernate.orm.jdbc.bind: trace


# 파일 설정
file:
  storage:
    type: local
    endpoint: ${STORAGE_ENDPOINT}

  local:
    base:
      path: ${FILE_BASE_PATH:./storage/files}
      url: ${FILE_BASE_URL:/upload/}
  s3:
    bucket: sparta-bucket
    region: ap-northeast-2
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

