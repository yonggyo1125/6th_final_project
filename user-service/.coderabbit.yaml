language: "ko-KR"

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - "!**/generated/**"
    - "!**/*.generated.java"
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/resources/static/**"

  path_instructions:
    - path: "**/domain/**"
      instructions: |
        DDD 도메인 레이어 규칙을 엄격하게 검토해주세요.

        [Aggregate]
        - Aggregate Root만 외부에서 접근 가능해야 합니다
        - 다른 Aggregate는 ID(식별자)로만 참조해야 합니다 (객체 직접 참조 금지)
        - Aggregate 경계를 넘는 트랜잭션이 있으면 반드시 지적해주세요

        [Entity / Value Object]
        - Entity는 비즈니스 불변식(invariant)을 스스로 보호해야 합니다
        - Value Object는 반드시 불변(immutable)이어야 합니다
        - Value Object에 setter 또는 상태 변경 메서드가 있으면 지적해주세요
        - Java 21 Record를 Value Object에 적극 활용하는지 확인해주세요

        [Domain Event]
        - 이름은 반드시 과거형이어야 합니다 (예: OrderCreated, PaymentCompleted)
        - 이벤트에 비즈니스 로직이 포함되어 있으면 지적해주세요

        [Repository]
        - Repository 인터페이스는 반드시 도메인 레이어에 위치해야 합니다
        - JPA, DB 등 인프라 의존성이 도메인 레이어에 침투하면 반드시 지적해주세요

        [Domain Service]
        - 여러 Aggregate에 걸친 도메인 로직에만 사용해야 합니다
        - Spring @Service 없이 순수 POJO로 작성되어야 합니다

    - path: "**/application/**"
      instructions: |
        Application Service 레이어 규칙을 검토해주세요.

        - UseCase / ApplicationService는 오케스트레이션(흐름 조율)만 담당해야 합니다
        - 비즈니스 로직이 Application 레이어에 직접 구현되어 있으면 지적해주세요
        - 트랜잭션 경계(@Transactional)가 Application 레이어에서 관리되는지 확인해주세요
        - Command/Query 분리(CQRS)가 적용되어 있는지 확인해주세요
        - DTO ↔ Domain 변환 책임이 명확한지 확인해주세요

    - path: "**/infrastructure/**"
      instructions: |
        Infrastructure 레이어 규칙을 검토해주세요.

        - Repository 구현체는 반드시 Domain Repository 인터페이스를 구현해야 합니다
        - JPA Entity(ORM 매핑용)와 Domain Entity가 분리되어 있는지 확인해주세요
        - 외부 시스템(API, 메시지 브로커 등) 연동 시 Anti-Corruption Layer(ACL)가 적용되었는지 확인해주세요
        - 인프라 구현 세부사항이 상위 레이어로 노출되지 않는지 확인해주세요

    - path: "**/interfaces/**"
      instructions: |
        Interfaces / Presentation 레이어 규칙을 검토해주세요.

        - Controller는 요청/응답 변환과 라우팅만 담당해야 합니다
        - Domain 객체가 Response로 직접 노출되지 않는지 확인해주세요
        - MSA 서비스 간 동기 통신(REST/gRPC)과 비동기 통신(Event)의 사용 맥락이 적절한지 확인해주세요

    - path: "**/*Service.java"
      instructions: |
        - 이 클래스가 Application Service인지 Domain Service인지 명확히 구분되어 있는지 확인해주세요
        - Application Service라면 비즈니스 로직 없이 흐름만 조율해야 합니다
        - Domain Service라면 Spring 빈이 아닌 순수 객체여야 합니다

    - path: "**/*.java"
      instructions: |
        Java 21 + Spring Boot 3.x 코드를 검토해주세요.

        [Java 21]
        - Record, Sealed Class, Pattern Matching, Switch Expression 등 최신 문법 활용 여부 확인
        - Virtual Thread 사용 시 적절성 확인

        [Spring Boot 3.x]
        - javax → jakarta 네임스페이스를 올바르게 사용하는지 확인
        - Spring Security 6.x 방식(SecurityFilterChain 빈 등)을 따르는지 확인

        [MSA]
        - 다른 서비스의 내부 구현에 강하게 결합되어 있으면 지적해주세요
        - 분산 트랜잭션 대신 Saga 패턴 또는 이벤트 기반 처리가 고려되었는지 확인해주세요
        - 서비스 간 통신 실패에 대한 회복탄력성(Resilience: retry, fallback, circuit breaker) 처리 확인

        [공통]
        - 순환 참조(Circular Dependency) 가능성 확인
        - 레이어 의존성 방향이 domain ← application ← infrastructure/interfaces 를 따르는지 확인

chat:
  auto_reply: true